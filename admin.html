<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Admin Panel | LifeLink</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<!-- ================= SECURITY CHECK ================= -->
<script>
    if (localStorage.getItem("admin") !== "true") {
        window.location.href = "login.html";
    }
</script>

<!-- ================= HEADER ================= -->
<div class="bg-danger text-white py-3">
    <div class="container d-flex justify-content-between align-items-center">

        <h3 class="mb-0">LifeLink Admin Panel</h3>

        <!-- LOGOUT -->
        <button class="btn btn-light btn-sm" onclick="logout()">
            Logout
        </button>

    </div>
</div>

<!-- ================= CONTENT ================= -->
<div class="container py-4">

    <h4 class="mb-3">Registered Donors</h4>

    <!-- DONOR LIST -->
    <div class="row g-3" id="adminDonorList">
        <!-- JS loads donors here -->
    </div>

</div>

<script src="script.js"></script>

<script>
// ================= LOGOUT =================
function logout() {
    localStorage.removeItem("admin");
    window.location.href = "login.html";
}
</script>

</body>
</html>
