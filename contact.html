<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Contact | LifeLink</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js"></script>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
<div class="container">

<a class="navbar-brand fw-bold fs-3 text-danger" href="index.html">
<i class="fa-solid fa-droplet"></i> LifeLink
</a>

</div>
</nav>

<!-- HERO -->
<section class="py-5 bg-light text-center">
<h1 class="fw-bold text-danger">Contact Us</h1>
<p class="text-muted">We are here to help 24/7</p>
</section>

<!-- FORM -->
<section class="py-5">
<div class="container">
<div class="row justify-content-center">
<div class="col-lg-7">

<div class="card shadow p-4">

<h3 class="text-center mb-4">Send Message</h3>

<form id="contactForm">

<div class="mb-3">
<input id="name" type="text" class="form-control" placeholder="Your Name" required>
</div>

<div class="mb-3">
<input id="email" type="email" class="form-control" placeholder="Your Email" required>
</div>

<div class="mb-3">
<textarea id="message" class="form-control" rows="4" placeholder="Your Message" required></textarea>
</div>

<button type="submit" class="btn btn-danger w-100 rounded-pill">
Send Message
</button>

</form>

</div>

</div>
</div>
</div>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-4">
© 2026 LifeLink
</footer>

<!-- ================= FIREBASE CONFIG ================= -->
<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<!-- ================= FORM LOGIC ================= -->
<script>
document.getElementById("contactForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const contactData = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value,
        createdAt: new Date()
    };

    try {
        await db.collection("contacts").add(contactData);
        alert("✅ Message sent successfully!");
        document.getElementById("contactForm").reset();
    } catch (error) {
        console.error(error);
        alert("❌ Failed to send message");
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
