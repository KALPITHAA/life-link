<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Find Donors | LifeLink</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="style.css">

<!-- ================= FIREBASE CDN ================= -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js"></script>

</head>

<body>

<!-- NAVBAR (unchanged) -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
<div class="container">
<a class="navbar-brand fw-bold fs-3 text-danger" href="index.html">
<i class="fa-solid fa-droplet"></i> LifeLink
</a>
</div>
</nav>

<!-- HERO -->
<section class="py-5 bg-light text-center">
<h1 class="fw-bold text-danger">Find Blood Donors</h1>
<p class="text-muted">Search verified donors from Firebase</p>
</section>

<!-- SEARCH -->
<section class="py-4">
<div class="container">

<div class="row g-3 justify-content-center">

<div class="col-md-4">
<select class="form-select" id="bloodFilter">
<option value="">Select Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>
</div>

<div class="col-md-4">
<input type="text" class="form-control" id="locationFilter" placeholder="Enter Location">
</div>

<div class="col-md-2">
<button class="btn btn-danger w-100" id="searchBtn">
Search
</button>
</div>

</div>

</div>
</section>

<!-- DONOR LIST -->
<section class="py-5">
<div class="container">
<div class="row g-4" id="donorList"></div>
</div>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-4">
© 2026 LifeLink
</footer>

<!-- ================= FIREBASE CONFIG ================= -->
<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<!-- ================= SEARCH LOGIC ================= -->
<script>
document.getElementById("searchBtn").addEventListener("click", async () => {

    const blood = document.getElementById("bloodFilter").value;
    const location = document.getElementById("locationFilter").value.toLowerCase();

    const donorList = document.getElementById("donorList");
    donorList.innerHTML = "";

    try {
        let query = db.collection("donors");

        if (blood) {
            query = query.where("bloodGroup", "==", blood);
        }

        const snapshot = await query.get();

        let found = false;

        snapshot.forEach(doc => {
            const d = doc.data();

            if (location && !d.address.toLowerCase().includes(location)) {
                return;
            }

            found = true;

            donorList.innerHTML += `
                <div class="col-md-4">
                    <div class="card shadow p-3 rounded-4">
                        <h5 class="text-danger">${d.name}</h5>
                        <p>🩸 ${d.bloodGroup}</p>
                        <p>📞 ${d.phone}</p>
                        <p>📍 ${d.address}</p>
                    </div>
                </div>
            `;
        });

        if (!found) {
            donorList.innerHTML = `<p class="text-center text-muted">No donors found</p>`;
        }

    } catch (error) {
        console.error(error);
        alert("Error fetching donors");
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
