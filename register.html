<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Register | LifeLink Blood Donation</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- ================= FIREBASE CDN ================= -->
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js"></script>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
    <div class="container">

        <a class="navbar-brand fw-bold fs-3 text-danger" href="index.html">
            <i class="fa-solid fa-droplet"></i> LifeLink
        </a>

    </div>
</nav>

<!-- ================= HERO ================= -->
<section class="py-5 bg-light">
    <div class="container text-center">
        <h1 class="fw-bold text-danger">Become a Blood Donor ❤️</h1>
        <p class="text-muted">Register today and save lives</p>
    </div>
</section>

<!-- ================= FORM ================= -->
<section class="py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card shadow border-0 rounded-4 p-4">

                    <h3 class="text-center mb-4 fw-bold">Donor Registration Form</h3>

                    <form id="registerForm">

                        <div class="row g-3">

                            <div class="col-md-6">
                                <input id="name" type="text" class="form-control" placeholder="Full Name" required>
                            </div>

                            <div class="col-md-6">
                                <input id="age" type="number" class="form-control" placeholder="Age" required>
                            </div>

                            <div class="col-md-6">
                                <select id="bloodGroup" class="form-select" required>
                                    <option value="">Blood Group</option>
                                    <option>A+</option>
                                    <option>A-</option>
                                    <option>B+</option>
                                    <option>B-</option>
                                    <option>AB+</option>
                                    <option>AB-</option>
                                    <option>O+</option>
                                    <option>O-</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <input id="phone" type="tel" class="form-control" placeholder="Phone Number" required>
                            </div>

                            <div class="col-md-12">
                                <input id="email" type="email" class="form-control" placeholder="Email" required>
                            </div>

                            <div class="col-md-12">
                                <textarea id="address" class="form-control" rows="3" placeholder="Address" required></textarea>
                            </div>

                        </div>

                        <button type="submit" class="btn btn-danger w-100 mt-4 rounded-pill py-2">
                            Register as Donor
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- ================= FOOTER ================= -->
<footer class="bg-dark text-white text-center py-4">
    <div class="container">
        <p class="mb-0">© 2026 LifeLink | Blood Donation Portal</p>
    </div>
</footer>

<!-- ================= FIREBASE CONFIG ================= -->
<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<!-- ================= FORM LOGIC ================= -->
<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const donorData = {
        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        bloodGroup: document.getElementById("bloodGroup").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        address: document.getElementById("address").value,
        createdAt: new Date()
    };

    try {
        await db.collection("donors").add(donorData);
        alert("✅ Registered Successfully!");
        document.getElementById("registerForm").reset();
    } catch (error) {
        console.error(error);
        alert("❌ Error saving data");
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
