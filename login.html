<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Admin Login | LifeLink</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow border-0 p-4 rounded-4">

                <h3 class="text-center text-danger mb-4">Admin Login</h3>

                <input type="text" id="username" class="form-control mb-3" placeholder="Username">

                <input type="password" id="password" class="form-control mb-3" placeholder="Password">

                <button class="btn btn-danger w-100" onclick="login()">
                    Login
                </button>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

<script>
function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    // simple fixed login (frontend only)
    if (user === "admin" && pass === "1234") {
        localStorage.setItem("admin", "true");
        window.location.href = "admin.html";
    } else {
        alert("Invalid login");
    }
}
</script>

</body>
</html>
