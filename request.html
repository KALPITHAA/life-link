<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Request Blood | LifeLink</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js"></script>

</head>

<body>

<!-- NAVBAR (unchanged) -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
<div class="container">
<a class="navbar-brand fw-bold fs-3 text-danger" href="index.html">
<i class="fa-solid fa-droplet"></i> LifeLink
</a>
</div>
</nav>

<!-- HERO -->
<section class="py-5 bg-light text-center">
<h1 class="fw-bold text-danger">Request Blood</h1>
<p class="text-muted">Submit request and get help quickly</p>
</section>

<!-- FORM -->
<section class="py-5">
<div class="container">
<div class="row justify-content-center">
<div class="col-lg-8">

<div class="card shadow p-4">

<h3 class="text-center mb-4">Blood Request Form</h3>

<form id="requestForm">

<div class="row g-3">

<div class="col-md-6">
<input id="patientName" class="form-control" placeholder="Patient Name" required>
</div>

<div class="col-md-6">
<select id="bloodGroup" class="form-select" required>
<option value="">Blood Group</option>
<option>A+</option><option>A-</option>
<option>B+</option><option>B-</option>
<option>AB+</option><option>AB-</option>
<option>O+</option><option>O-</option>
</select>
</div>

<div class="col-md-6">
<input id="units" type="number" class="form-control" placeholder="Units Required" required>
</div>

<div class="col-md-6">
<input id="hospital" class="form-control" placeholder="Hospital Name" required>
</div>

<div class="col-md-6">
<input id="contact" class="form-control" placeholder="Contact Number" required>
</div>

<div class="col-md-6">
<input id="location" class="form-control" placeholder="Location" required>
</div>

<div class="col-md-12">
<select id="urgency" class="form-select">
<option>Normal</option>
<option>Urgent</option>
<option>Emergency</option>
</select>
</div>

<div class="col-md-12">
<textarea id="details" class="form-control" placeholder="Additional Details"></textarea>
</div>

</div>

<button class="btn btn-danger w-100 mt-4 rounded-pill">
Submit Request
</button>

</form>

</div>

</div>
</div>
</div>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-4">
© 2026 LifeLink
</footer>

<!-- ================= FIREBASE CONFIG ================= -->
<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<!-- ================= FORM LOGIC ================= -->
<script>
document.getElementById("requestForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const requestData = {
        patientName: document.getElementById("patientName").value,
        bloodGroup: document.getElementById("bloodGroup").value,
        units: document.getElementById("units").value,
        hospital: document.getElementById("hospital").value,
        contact: document.getElementById("contact").value,
        location: document.getElementById("location").value,
        urgency: document.getElementById("urgency").value,
        details: document.getElementById("details").value,
        createdAt: new Date()
    };

    try {
        await db.collection("requests").add(requestData);
        alert("✅ Request Submitted Successfully!");
        document.getElementById("requestForm").reset();
    } catch (error) {
        console.error(error);
        alert("❌ Error submitting request");
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
